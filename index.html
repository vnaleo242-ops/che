<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khám phá Giải Phẫu 3D (v2)</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-helper" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:20px;">
        <h2 style="color:#00f2fe; font-family:sans-serif;">BOT ĐANG SẴN SÀNG</h2>
        <p style="color:white; font-family:sans-serif; margin-bottom:20px;">Nhấn nút bên dưới, sau đó dán (Ctrl+V) vào ô tài khoản để vào web ngay.</p>
        <button onclick="startLogin()" style="background:#6366f1; color:white; border:none; padding:20px 40px; border-radius:15px; font-size:20px; font-weight:bold; cursor:pointer; box-shadow:0 0 20px rgba(99,102,241,0.5);">NHẤN ĐỂ ĐĂNG NHẬP NGAY</button>
    </div>

    <script>
        function startLogin() {
            document.getElementById('login-helper').style.display = 'flex';
            // Copy mật khẩu vào clipboard
            const el = document.createElement('textarea');
            el.value = '0358204005';
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            
            alert("Đã copy tài khoản! Hãy nhấn Ctrl+V để dán vào trang Facourse sắp mở ra.");
            
            window.open('https://facourse.com/login', '_blank');
            document.getElementById('login-helper').style.display = 'none';
        }
    </script>

    <div class="dashboard">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Sinh Học 3D</h2>
                <p>Hệ thống mô phỏng giải phẫu - Facourse</p>
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="Tìm kiếm mô hình... (vd: Tim, Xương, Não)">
                </div>
            </div>
            <div class="models-list" id="models-list">
                <!-- Models will be injected here via JS -->
            </div>
        </aside>
        
        <main class="content">
            <div class="header">
                <h1 id="viewer-title">Chọn một mô hình giải phẫu</h1>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <!-- Đã xóa các nút chức năng để giao diện gọn gàng -->
                </div>
            </div>
            <div class="viewer-container">
                <div class="placeholder" id="viewer-placeholder">
                    <div class="pulsing-circle"></div>
                    <p>Hệ thống học mô phỏng 3D độc quyền.<br>Vui lòng chọn một khoá mô hình bên lề trái để bắt đầu khám phá.</p>
                </div>
                <div class="viewer-wrapper" id="viewer-wrapper" style="display: none;">
                    <!-- Iframe được load trực tiếp và liên tục lưu giữ trạng thái -->
                    <div id="iframe-cache-container" style="width: 100%; height: 100%; position: relative;"></div>
                </div>
        </main>
    </div>
    
    <script type="module" src="/script.js"></script>
</body>
</html>
